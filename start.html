<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三组扑克牌游戏 - 启动页面</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');
        
        body {
            font-family: 'Comic Neue', 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
            padding: 20px;
        }
        
        .container {
            background: rgba(255,255,255,0.9);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 3px solid #ffd166;
        }
        
        h1 {
            color: #ff6b6b;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-shadow: 3px 3px 0px #fecfef, 5px 5px 10px rgba(0,0,0,0.1);
        }
        
        h2 {
            color: #ff9a9e;
            margin-bottom: 20px;
        }
        
        .button {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            color: white;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        
        .button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(255, 107, 107, 0.4);
        }
        
        .info {
            background: #fff9e6;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            border: 2px solid #ffd166;
        }
        
        .info h3 {
            color: #ff6b6b;
            margin-bottom: 10px;
        }
        
        .info ul {
            text-align: left;
            margin: 10px 0;
            padding-left: 20px;
        }
        
        .info li {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>三组扑克牌游戏</h1>
        
        <h2>🎉 游戏已启动！</h2>
        
        <div class="info">
            <h3>如何访问游戏：</h3>
            <ul>
                <li>在浏览器中打开：<strong>http://localhost:3001</strong></li>
                <li>或在同一局域网内的其他设备上打开：<strong>http://主机IP:3001</strong></li>
            </ul>
        </div>
        
        <div class="info">
            <h3>游戏模式：</h3>
            <ul>
                <li><strong>本地游戏</strong>：添加AI对手，自己玩</li>
                <li><strong>多人对战</strong>：邀请朋友一起玩</li>
            </ul>
        </div>
        
        <a href="http://localhost:3000" class="button">开始游戏</a>
        
        <div style="margin-top: 30px; font-size: 0.9em; color: #666;">
            <p>提示：不要直接打开 index.html 文件，这样无法使用多人对战功能</p>
            <p>按 Ctrl+C 停止服务器</p>
        </div>
    </div>
</body>
</html>
